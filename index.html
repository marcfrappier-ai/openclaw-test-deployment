<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Test Deployment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: fadeIn 1s ease-in;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.9;
            animation: fadeIn 1.5s ease-in;
        }
        .success {
            background: rgba(255, 255, 255, 0.2);
            padding: 1.5rem 2rem;
            border-radius: 10px;
            margin-top: 2rem;
            backdrop-filter: blur(10px);
            animation: fadeIn 2s ease-in;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Hello World!</h1>
        <p>OpenClaw deployment test successful</p>
        <div class="success">
            <p><strong>✅ GitHub → Vercel pipeline is working!</strong></p>
            <p style="font-size: 0.9rem; margin-top: 0.5rem;">Deployed for Digillian LLC</p>
        </div>
    </div>
</body>
</html>
