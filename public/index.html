<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Test Deployment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-gradient-start: #0a0a0a;
            --bg-gradient-end: #000000;
            --text-color: white;
            --card-bg: rgba(255, 255, 255, 0.1);
            --toggle-bg: rgba(255, 255, 255, 0.2);
        }
        
        [data-theme="light"] {
            --bg-gradient-start: #ffffff;
            --bg-gradient-end: #f5f5f5;
            --text-color: #1a1a1a;
            --card-bg: rgba(0, 0, 0, 0.05);
            --toggle-bg: rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        
        .theme-toggle {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: var(--toggle-bg);
            border: none;
            border-radius: 50px;
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-color);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }
        
        .theme-toggle:hover {
            transform: scale(1.05);
            background: var(--card-bg);
        }
        
        .container {
            text-align: center;
            padding: 2rem;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: fadeIn 1s ease-in;
        }
        
        p {
            font-size: 1.2rem;
            opacity: 0.9;
            animation: fadeIn 1.5s ease-in;
        }
        
        .success {
            background: var(--card-bg);
            padding: 1.5rem 2rem;
            border-radius: 10px;
            margin-top: 2rem;
            backdrop-filter: blur(10px);
            animation: fadeIn 2s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">
        <span id="theme-icon">🌙</span>
        <span id="theme-text">Dark Mode</span>
    </button>
    
    <div class="container">
        <h1>🎉 Hello World!</h1>
        <p>OpenClaw deployment test successful</p>
        <div class="success">
            <p><strong>✅ GitHub → Vercel pipeline is working!</strong></p>
            <p style="font-size: 0.9rem; margin-top: 0.5rem;">Deployed for Digillian LLC</p>
        </div>
    </div>
    
    <script>
        // Check for saved theme preference or default to dark
        const currentTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeButton(currentTheme);
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton(newTheme);
        }
        
        function updateThemeButton(theme) {
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            
            if (theme === 'dark') {
                icon.textContent = '☀️';
                text.textContent = 'Light Mode';
            } else {
                icon.textContent = '🌙';
                text.textContent = 'Dark Mode';
            }
        }
    </script>
</body>
</html>
